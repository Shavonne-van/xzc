# .github/workflows/ci.yml
name: Python CI/CD 流水线（无pytest）

# 触发条件：push到main分支、PR合并到main分支时自动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 定义作业
jobs:
  test:
    runs-on: ubuntu-latest  # 运行在GitHub免费的Ubuntu虚拟机

    steps:
      # 步骤1：拉取仓库代码到虚拟机
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # 可根据需求修改版本

      # 步骤3：运行单元测试（用Python自带unittest，无需安装任何依赖）
      - name: Run unit tests
        run: |
          python -m unittest test_math_utils.py -v
